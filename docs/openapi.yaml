openapi: 3.1.0
info:
  title: Payments Ledger API (ISO 20022)
  version: 2.1.0
  description: |
    ISO 20022–aligned payments ledger API.
    Demo login: docs/AUTH.md (X-Demo-User header, not compliance-tested).
  license:
    name: MIT

servers:
  - url: /v1
    description: API v1

tags:
  - name: Health
  - name: Auth
  - name: Accounts
  - name: PaymentInitiations
  - name: Statements

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Demo user login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounts:
    post:
      tags: [Accounts]
      operationId: registerAccount
      summary: Register a cash account (seed / dev)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterAccountRequest"
      responses:
        "201":
          description: Account registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/ValidationError"

  /accounts/{id}:
    get:
      tags: [Accounts]
      operationId: getAccount
      summary: Get account and balance
      parameters:
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Account found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          $ref: "#/components/responses/NotFound"

  /accounts/{id}/statements:
    get:
      tags: [Statements]
      operationId: getAccountStatement
      summary: Get account statement entries (camt.053)
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Statement page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementPage"
        "404":
          $ref: "#/components/responses/NotFound"

  /payment-initiations:
    post:
      tags: [PaymentInitiations]
      operationId: createPaymentInitiation
      summary: Submit credit transfer initiation (pain.001)
      description: |
        Accepts a pain.001 Customer Credit Transfer Initiation (JSON binding).
        Returns a pain.002 Customer Payment Status Report.
        Idempotency is keyed on PmtId.endToEndId (max 35 chars).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreditTransferInitiation"
      responses:
        "200":
          description: Idempotent replay — original status returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPaymentStatusReport"
        "201":
          description: New initiation processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPaymentStatusReport"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: EndToEndId conflict (DU04)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPaymentStatusReport"

  /payment-initiations/transactions/{endToEndId}:
    get:
      tags: [PaymentInitiations]
      operationId: getTransactionStatus
      summary: Get transaction status by EndToEndId (pain.002)
      parameters:
        - name: endToEndId
          in: path
          required: true
          schema:
            type: string
            maxLength: 35
          description: PmtId.EndToEndId from the original initiation
      responses:
        "200":
          description: Transaction status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionStatusInfo"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    AccountId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    Cursor:
      name: cursor
      in: query
      schema:
        type: string

  responses:
    ValidationError:
      description: HTTP validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Insufficient role or scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    UserRole:
      type: string
      enum: [payer, support, benchmark]

    User:
      type: object
      required: [email, displayName, role, accountIds]
      properties:
        email:
          type: string
        displayName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        accountIds:
          type: array
          items:
            type: string
            format: uuid

    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    CurrencyAndAmount:
      type: object
      required: [value, ccy]
      properties:
        value:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          description: Decimal amount as string (ISO 20022 ActiveOrHistoricCurrencyAndAmount)
          example: "50.00"
        ccy:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code
          example: USD

    PartyIdentification:
      type: object
      required: [nm]
      properties:
        nm:
          type: string
          maxLength: 140
        id:
          type: object
          properties:
            othr:
              type: object
              properties:
                id:
                  type: string
                  maxLength: 35

    AccountIdentification:
      type: object
      required: [id]
      properties:
        id:
          type: object
          required: [othr]
          properties:
            othr:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
        ccy:
          type: string
          pattern: '^[A-Z]{3}$'

    AccountStatus:
      type: string
      enum: [active, closed]

    RegisterAccountRequest:
      type: object
      required: [owner, ccy]
      properties:
        owner:
          $ref: "#/components/schemas/PartyIdentification"
        ccy:
          type: string
          pattern: '^[A-Z]{3}$'

    Account:
      type: object
      required: [id, owner, ccy, bal, status, creDtTm]
      properties:
        id:
          type: string
          format: uuid
        owner:
          $ref: "#/components/schemas/PartyIdentification"
        ccy:
          type: string
          pattern: '^[A-Z]{3}$'
        bal:
          $ref: "#/components/schemas/CurrencyAndAmount"
        status:
          $ref: "#/components/schemas/AccountStatus"
        creDtTm:
          type: string
          format: date-time

    PaymentIdentification:
      type: object
      required: [endToEndId]
      properties:
        instrId:
          type: string
          maxLength: 35
        endToEndId:
          type: string
          maxLength: 35
          description: Idempotency key; passed unchanged end-to-end

    RemittanceInformation:
      type: object
      properties:
        ustrd:
          type: array
          items:
            type: string
            maxLength: 140

    CreditTransferTransaction:
      type: object
      required: [pmtId, amt, cdtr, cdtrAcct]
      properties:
        pmtId:
          $ref: "#/components/schemas/PaymentIdentification"
        amt:
          type: object
          required: [instdAmt]
          properties:
            instdAmt:
              $ref: "#/components/schemas/CurrencyAndAmount"
        cdtr:
          $ref: "#/components/schemas/PartyIdentification"
        cdtrAcct:
          $ref: "#/components/schemas/AccountIdentification"
        rmtInf:
          $ref: "#/components/schemas/RemittanceInformation"

    PaymentInstruction:
      type: object
      required: [pmtInfId, pmtMtd, dbtr, dbtrAcct, cdtTrfTxInf]
      properties:
        pmtInfId:
          type: string
          maxLength: 35
        pmtMtd:
          type: string
          enum: [TRF]
        dbtr:
          $ref: "#/components/schemas/PartyIdentification"
        dbtrAcct:
          $ref: "#/components/schemas/AccountIdentification"
        cdtTrfTxInf:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreditTransferTransaction"

    GroupHeader:
      type: object
      required: [msgId, creDtTm, nbOfTxs, ctrlSum, initgPty]
      properties:
        msgId:
          type: string
          maxLength: 35
        creDtTm:
          type: string
          format: date-time
        nbOfTxs:
          type: string
          pattern: '^[0-9]+$'
        ctrlSum:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
        initgPty:
          $ref: "#/components/schemas/PartyIdentification"

    CustomerCreditTransferInitiation:
      type: object
      required: [grpHdr, pmtInf]
      description: pain.001.001.09 CstmrCdtTrfInitn (JSON binding)
      properties:
        grpHdr:
          $ref: "#/components/schemas/GroupHeader"
        pmtInf:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PaymentInstruction"

    TransactionStatusCode:
      type: string
      enum: [PDNG, ACSC, RJCT]
      description: ExternalPaymentTransactionStatus1Code subset

    GroupStatusCode:
      type: string
      enum: [ACSC, RJCT, PART]

    StatusReasonCode:
      type: string
      enum: [AM04, AC04, AM12, CURR, DU04, AG01, BE01]

    StatusReasonInformation:
      type: object
      required: [rsn]
      properties:
        rsn:
          type: object
          required: [cd]
          properties:
            cd:
              $ref: "#/components/schemas/StatusReasonCode"
        addtlInf:
          type: array
          items:
            type: string
            maxLength: 105

    TransactionStatusInfo:
      type: object
      required: [orgnlEndToEndId, txSts]
      properties:
        orgnlEndToEndId:
          type: string
          maxLength: 35
        txSts:
          $ref: "#/components/schemas/TransactionStatusCode"
        stsRsnInf:
          type: array
          items:
            $ref: "#/components/schemas/StatusReasonInformation"

    CustomerPaymentStatusReport:
      type: object
      required: [grpHdr, orgnlGrpInfAndSts]
      description: pain.002.001.10 (JSON binding)
      properties:
        grpHdr:
          type: object
          required: [msgId, creDtTm]
          properties:
            msgId:
              type: string
            creDtTm:
              type: string
              format: date-time
        orgnlGrpInfAndSts:
          type: object
          required: [orgnlMsgId, orgnlMsgNmId, grpSts]
          properties:
            orgnlMsgId:
              type: string
            orgnlMsgNmId:
              type: string
              example: pain.001.001.09
            grpSts:
              $ref: "#/components/schemas/GroupStatusCode"
        orgnlPmtInfAndSts:
          type: array
          items:
            type: object
            properties:
              orgnlPmtInfId:
                type: string
              txInfAndSts:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionStatusInfo"

    CreditDebitCode:
      type: string
      enum: [CRDT, DBIT]

    StatementEntry:
      type: object
      required: [ntryRef, amt, cdtDbtInd, sts, bookgDt]
      properties:
        ntryRef:
          type: string
          format: uuid
        amt:
          $ref: "#/components/schemas/CurrencyAndAmount"
        cdtDbtInd:
          $ref: "#/components/schemas/CreditDebitCode"
        sts:
          type: string
          enum: [BOOK]
        bookgDt:
          type: object
          required: [dt]
          properties:
            dt:
              type: string
              format: date
        ntryDtls:
          type: array
          items:
            type: object
            properties:
              txDtls:
                type: array
                items:
                  type: object
                  properties:
                    refs:
                      type: object
                      properties:
                        endToEndId:
                          type: string

    StatementPage:
      type: object
      required: [stmt, hasMore]
      properties:
        stmt:
          type: object
          required: [id, creDtTm, acct, ntry]
          properties:
            id:
              type: string
            creDtTm:
              type: string
              format: date-time
            acct:
              $ref: "#/components/schemas/AccountIdentification"
            bal:
              type: array
              items:
                type: object
                properties:
                  tp:
                    type: object
                    properties:
                      cdOrPrtry:
                        type: object
                        properties:
                          cd:
                            type: string
                            enum: [CLBD]
                  amt:
                    $ref: "#/components/schemas/CurrencyAndAmount"
                  cdtDbtInd:
                    $ref: "#/components/schemas/CreditDebitCode"
                  dt:
                    type: object
                    properties:
                      dt:
                        type: string
                        format: date
            ntry:
              type: array
              items:
                $ref: "#/components/schemas/StatementEntry"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - INVALID_CREDENTIALS
                - FORBIDDEN
                - NOT_FOUND
            message:
              type: string
            details:
              type: object
              additionalProperties: true
